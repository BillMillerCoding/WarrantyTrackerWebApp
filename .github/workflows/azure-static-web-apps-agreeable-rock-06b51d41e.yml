name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: checkout
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: npm install
        run: npm i
        working-directory: ./WarranTeaFrontEnd
      - name: Run frontend tests
        run: npm test
        working-directory: ./WarranTeaFrontEnd
      - name: generate
        run: npm run generate
        working-directory: ./WarranTeaFrontEnd
        env:
          NUXT_PUBLIC_API_BASE: "https://warrenteaapi.azurewebsites.net/api"
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_ROCK_06B51D41E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/WarranTeaFrontEnd/.output/public" # App source code path
          skip_app_build: true
          ###### End of Repository/Build Configurations ######
